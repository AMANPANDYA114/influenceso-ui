<svg width="780" height="374" viewBox="0 0 780 374" xmlns="http://www.w3.org/2000/svg">

  <!-- Card Background -->
  <rect x="0" y="0" width="780" height="374" rx="40" fill="#EFEFEF"/>

  <!-- Avatar Clip -->
  <defs>
    <clipPath id="avatarClip">
      <circle cx="110" cy="130" r="60"/>
    </clipPath>
  </defs>

  <!-- Man Image -->
  <image
    href="https://randomuser.me/api/portraits/men/32.jpg"
    x="50"
    y="70"
    width="120"
    height="120"
    clip-path="url(#avatarClip)"
    preserveAspectRatio="xMidYMid slice"
  />

  <!-- Online Dot -->
  <circle cx="160" cy="170" r="14" fill="#34C759" stroke="white" stroke-width="4"/>

  <!-- Title -->
  <text x="200" y="120"
        font-size="40"
        font-family="Arial, Helvetica, sans-serif"
        fill="#555"
        font-weight="600">
        Influenceso Platform
  </text>

  <!-- Subtitle -->
  <text x="200" y="165"
        font-size="26"
        font-family="Arial, Helvetica, sans-serif"
        fill="#6B6B6B">
        Connect brands & influencers seamlessly
  </text>

  <!-- Message Button -->
  <rect x="280" y="215" width="240" height="85" rx="42" fill="#D25574"/>

  <!-- Button Text -->
  <text x="345" y="268"
        font-size="32"
        font-family="Arial, Helvetica, sans-serif"
        fill="white"
        font-weight="600">
        Message
  </text>

</svg>